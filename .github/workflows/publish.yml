name: Publish Talks

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Restore build cache
        uses: actions/cache@v5
        with:
          path: ./out
          key: talks-out-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: talks-out-${{ github.ref_name }}-

      - name: Build slides
        run: bin/build

      - name: Check manifest cache
        id: manifest-cache
        uses: actions/cache@v5
        with:
          path: ./out/manifest.json
          key: manifest-${{ hashFiles('out/manifest.json') }}

      - name: Trigger Jekyll rebuild if manifest changed
        if: steps.manifest-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.HSCHNE_DISPATCH_TOKEN }}
        run: |
          echo "Manifest changed — triggering Jekyll rebuild"
          gh api repos/hschne/hschne.github.io/dispatches -f event_type=slides

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
